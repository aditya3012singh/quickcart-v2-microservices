syntax = "proto3";

package product;

service ProductService{
    rpc ReserveStock (ReserveRequest) returns (ReserveResponse);
    rpc ReleaseStock (ReleaseRequest) returns (ReserveResponse);
}

message ReserveRequest {
  string productId = 1;
  int32 quantity = 2;
  string correlationId = 3;
  string orderId = 4;
  string eventId = 5;
}

message ReleaseRequest {
  string productId = 1;
  int32 quantity = 2;
  string correlationId = 3;
  string orderId = 4;
  string eventId = 5;
}

message ReserveResponse {
  bool success=1;
  string message=2;
}